<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Ports and adapters architecture for the vision inference API</title>
  <desc id="desc">An onion-style diagram with an outside adapter layer wrapped around an inside application core. HTTP drives the service from the left, and the YOLO adapter implements the inference port from the right.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3437"/>
    </marker>
    <marker id="dash-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6065"/>
    </marker>
    <style>
      .label { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2f3437; }
      .small { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5358; }
      .tiny { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f686e; }
      .title { font: 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 650; fill: #202427; }
      .section { font: 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 600; fill: #2f3437; }
      .box { fill: #fff7c2; stroke: #2f3437; stroke-width: 2; }
      .adapter { fill: #f4f6f8; stroke: #2f3437; stroke-width: 2; }
      .driver { fill: #dff5e5; stroke: #2f3437; stroke-width: 2; }
      .outer { fill: #fbfbfb; stroke: #2f3437; stroke-width: 3; }
      .inner { fill: #ffffff; stroke: #2f3437; stroke-width: 3; }
      .line { fill: none; stroke: #2f3437; stroke-width: 2.5; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #5b6065; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#dash-arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="620" fill="#ffffff"/>
  <text x="550" y="48" text-anchor="middle" class="title">Ports and Adapters Architecture</text>
  <text x="550" y="76" text-anchor="middle" class="label">Vision Inference API</text>

  <ellipse cx="550" cy="330" rx="365" ry="245" class="outer"/>
  <ellipse cx="550" cy="330" rx="225" ry="155" class="inner"/>
  <text x="550" y="118" text-anchor="middle" class="section">Outside</text>
  <text x="550" y="222" text-anchor="middle" class="section">Inside</text>
  <text x="550" y="244" text-anchor="middle" class="small">Application core</text>

  <line x1="550" y1="185" x2="550" y2="475" stroke="#2f3437" stroke-width="3"/>
  <text x="246" y="170" text-anchor="middle" class="section">Driver</text>
  <text x="862" y="170" text-anchor="middle" class="section">Driven</text>

  <rect x="60" y="286" width="112" height="72" rx="10" class="driver"/>
  <text x="116" y="317" text-anchor="middle" class="small">HTTP</text>
  <text x="116" y="339" text-anchor="middle" class="small">Client</text>

  <rect x="212" y="275" width="136" height="94" rx="12" class="adapter"/>
  <text x="280" y="307" text-anchor="middle" class="tiny">&lt;&lt;adapter&gt;&gt;</text>
  <text x="280" y="330" text-anchor="middle" class="small">FastAPI</text>
  <text x="280" y="350" text-anchor="middle" class="small">routes + DTOs</text>

  <rect x="420" y="264" width="146" height="78" rx="12" class="box"/>
  <text x="493" y="295" text-anchor="middle" class="tiny">&lt;&lt;use case&gt;&gt;</text>
  <text x="493" y="321" text-anchor="middle" class="small">detect_objects()</text>

  <rect x="438" y="384" width="112" height="58" rx="10" class="box"/>
  <text x="494" y="417" text-anchor="middle" class="small">Domain VOs</text>

  <rect x="622" y="286" width="162" height="78" rx="12" class="box"/>
  <text x="703" y="316" text-anchor="middle" class="tiny">&lt;&lt;port&gt;&gt;</text>
  <text x="703" y="338" text-anchor="middle" class="small">InferenceEngine</text>

  <rect x="828" y="286" width="138" height="88" rx="12" class="adapter"/>
  <text x="897" y="316" text-anchor="middle" class="tiny">&lt;&lt;adapter&gt;&gt;</text>
  <text x="897" y="338" text-anchor="middle" class="small">YOLO</text>
  <text x="897" y="358" text-anchor="middle" class="small">engine</text>

  <path d="M172 322 L212 322" class="line"/>
  <path d="M348 322 L420 305" class="line"/>
  <path d="M493 342 L493 384" class="line"/>
  <path d="M566 305 L622 322" class="line"/>
  <path d="M828 326 L784 326" class="dash"/>
  <path d="M897 374 C885 430 782 455 550 428" class="line"/>

  <text x="190" y="300" text-anchor="middle" class="tiny">POST JPEG</text>
  <text x="384" y="296" text-anchor="middle" class="tiny">raw bytes</text>
  <text x="594" y="300" text-anchor="middle" class="tiny">calls</text>
  <text x="810" y="305" text-anchor="middle" class="tiny">implements</text>
  <text x="766" y="472" text-anchor="middle" class="tiny">maps tensors to domain values</text>

  <text x="550" y="588" text-anchor="middle" class="small">Dependency rule: source-code dependencies point inward toward the application core.</text>
</svg>
